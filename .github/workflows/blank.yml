name: Build and Test

# 1. Triggers: When should this workflow run?
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

# 2. Jobs: What tasks should be executed?
jobs:
  build_and_test:
    # The operating system the job will run on
    runs-on: ubuntu-latest

    # Node version strategy
    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]

    # 3. Steps: The sequence of commands to run in this job
    steps:
      # Checkout the repository code
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Setup Node.js environment
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Run linter
      - name: Lint code
        run: npm run lint

      # Build the project
      - name: Build project
        run: npm run build

      # Run tests
      - name: Run tests
        run: npm test

      # Upload test results (optional)
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: ./test-results/
